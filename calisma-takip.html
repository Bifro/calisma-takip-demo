<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>Çalışma Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --green:#1D9E75;--green-dim:rgba(29,158,117,0.15);
  --red:#D85A30;--red-dim:rgba(216,90,48,0.15);
  --yellow:#d4a017;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:12px;--r-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;overscroll-behavior:none}
.app{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto}

.header{padding:1.25rem 1.25rem 0;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px}
.sync-badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:99px;border:1px solid var(--border2);color:var(--text3);display:flex;align-items:center;gap:4px;transition:all .3s}
.sync-badge.ok{color:var(--green);border-color:var(--green-dim)}
.sync-badge.err{color:var(--red);border-color:var(--red-dim)}
.sync-badge.syncing{color:var(--yellow);border-color:rgba(212,160,23,.3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.header-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background .3s}
.header-dot.running{background:var(--green);box-shadow:0 0 0 3px var(--green-dim);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.tabs{display:flex;padding:1rem 1.25rem 0;border-bottom:1px solid var(--border);margin-top:.75rem}
.tab{flex:1;padding:.6rem 0;text-align:center;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .2s,border-color .2s;font-family:var(--sans)}
.tab.active{color:var(--text);border-bottom-color:var(--green)}

.content{flex:1;padding:1.25rem;overflow-y:auto}
.section{display:none}
.section.active{display:block}

.timer-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:2rem 1.5rem;text-align:center;margin-bottom:1rem}
.timer-day{font-size:12px;color:var(--text2);margin-bottom:1.25rem;letter-spacing:.3px}
.timer-display{font-family:var(--mono);font-size:clamp(40px,12vw,56px);font-weight:400;color:var(--text);letter-spacing:4px;margin-bottom:1.5rem;transition:color .3s}
.timer-display.running{color:var(--green)}
.timer-btns{display:flex;gap:10px;justify-content:center}
.btn-start{background:var(--green);color:#fff;border:none;padding:12px 32px;border-radius:var(--r-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:opacity .2s}
.btn-stop{background:var(--red);color:#fff;border:none;padding:12px 32px;border-radius:var(--r-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:opacity .2s}
.btn-start:disabled,.btn-stop:disabled{opacity:.3;cursor:default}
.btn-start:not(:disabled):active,.btn-stop:not(:disabled):active{opacity:.8;transform:scale(.97)}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:.9rem .5rem;text-align:center}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.stat-value{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text)}

.sec-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

.session-list{display:flex;flex-direction:column;gap:6px}
.session-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px}
.session-date{font-size:13px;color:var(--text2)}
.session-right{display:flex;align-items:center;gap:10px}
.session-dur{font-family:var(--mono);font-size:14px;color:var(--text)}
.btn-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1}
.btn-del:active{color:var(--red)}
.empty{font-size:13px;color:var(--text3);text-align:center;padding:2rem 0}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.25rem}
.wday{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 3px;text-align:center}
.wday.today{background:var(--green-dim);border-color:var(--green)}
.wday-name{font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase}
.wday.today .wday-name{color:var(--green)}
.wday-val{font-family:var(--mono);font-size:11px;color:var(--text2)}
.wday.today .wday-val{color:var(--green)}

.period-tabs{display:flex;gap:6px;margin-bottom:1rem}
.ptab{padding:6px 16px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:99px;background:none;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .2s}
.ptab.active{background:var(--text);color:var(--bg);border-color:transparent}
.task-input-row{display:flex;gap:8px;margin-bottom:12px}
.task-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none}
.task-input::placeholder{color:var(--text3)}
.task-input:focus{border-color:var(--green)}
.btn-add{background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);padding:10px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.btn-add:active{opacity:.8}
.task-list{display:flex;flex-direction:column;gap:6px}
.task-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px}
.task-cb{width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.task-text{flex:1;font-size:14px;color:var(--text)}
.task-text.done{text-decoration:line-through;color:var(--text3)}

.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:100;transition:opacity .4s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text2)}

/* info box */
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:1.25rem;font-size:12px;color:var(--text2);line-height:1.6}
.info-box b{color:var(--text);font-weight:500}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Veriler yükleniyor...</div>
</div>

<div class="app">
  <div class="header">
    <span class="header-title">Çalışma Takip</span>
    <div class="header-right">
      <div class="sync-badge" id="syncBadge">
        <div class="sync-dot"></div>
        <span id="syncText">bağlanıyor</span>
      </div>
      <div class="header-dot" id="headerDot"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('timer',this)">Kronometre</button>
    <button class="tab" onclick="switchTab('stats',this)">İstatistik</button>
    <button class="tab" onclick="switchTab('tasks',this)">Görevler</button>
  </div>

  <div class="content">
    <div id="tab-timer" class="section active">
      <div class="timer-block">
        <div class="timer-day" id="timerDay"></div>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="timer-btns">
          <button class="btn-start" id="btnStart" onclick="startTimer()">▶ Başlat</button>
          <button class="btn-stop" id="btnStop" onclick="stopTimer()" disabled>■ Kaydet</button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Bugün</div><div class="stat-value" id="s-today">—</div></div>
        <div class="stat-card"><div class="stat-label">Bu Hafta</div><div class="stat-value" id="s-week">—</div></div>
        <div class="stat-card"><div class="stat-label">Bu Ay</div><div class="stat-value" id="s-month">—</div></div>
      </div>
      <div class="sec-label">Son seanslar</div>
      <div class="session-list" id="recentList"></div>
    </div>

    <div id="tab-stats" class="section">
      <div class="sec-label" style="margin-bottom:10px">Bu haftanın dağılımı</div>
      <div class="week-grid" id="weekGrid"></div>
      <div class="sec-label">Tüm seanslar</div>
      <div class="session-list" id="allList"></div>
    </div>

    <div id="tab-tasks" class="section">
      <div class="period-tabs">
        <button class="ptab active" onclick="switchPeriod('daily',this)">Günlük</button>
        <button class="ptab" onclick="switchPeriod('weekly',this)">Haftalık</button>
      </div>
      <div class="task-input-row">
        <input type="text" class="task-input" id="taskInput" placeholder="Yeni görev..."/>
        <button class="btn-add" onclick="addTask()">+ Ekle</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
  </div>
</div>

<script>
// ── State ──
var store = { sessions: [], tasks: { daily: [], weekly: [] }, runningStart: null };
var running = false, startMs = null, timerInterval = null, currentPeriod = 'daily';

// ── Firebase config (Firestore REST API — no SDK needed, works in any browser) ──
// Using a public demo project. Replace PROJECT_ID + COLLECTION if you want your own.
var PROJECT_ID = 'calisma-takip-74fd5';
var BASE_URL   = 'https://firestore.googleapis.com/v1/projects/' + PROJECT_ID + '/databases/(default)/documents/';
var DOC_ID     = 'shared_data'; // single document, everyone reads/writes this

// Firestore REST helpers
async function fsGet() {
  try {
    var r = await fetch(BASE_URL + DOC_ID);
    if (!r.ok) return null;
    var d = await r.json();
    return d.fields ? {
      sessions: JSON.parse(d.fields.sessions.stringValue || '[]'),
      tasks:    JSON.parse(d.fields.tasks.stringValue    || '{"daily":[],"weekly":[]}'),
      runningStart: d.fields.runningStart ? JSON.parse(d.fields.runningStart.stringValue) : null
    } : null;
  } catch(e){ return null; }
}
async function fsPatch(data) {
  try {
    await fetch(BASE_URL + DOC_ID + '?currentDocument.exists=false', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ fields:{
        sessions:     { stringValue: JSON.stringify(data.sessions) },
        tasks:        { stringValue: JSON.stringify(data.tasks) },
        runningStart: { stringValue: JSON.stringify(data.runningStart) }
      }})
    }).catch(()=>{});
    await fetch(BASE_URL + DOC_ID, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ fields:{
        sessions:     { stringValue: JSON.stringify(data.sessions) },
        tasks:        { stringValue: JSON.stringify(data.tasks) },
        runningStart: { stringValue: JSON.stringify(data.runningStart) }
      }})
    });
  } catch(e){}
}

// ── localStorage fallback (works offline + as cache) ──
function lcSave() { try { localStorage.setItem('ct_v2', JSON.stringify(store)); } catch(e){} }
function lcLoad() { try { var s=JSON.parse(localStorage.getItem('ct_v2')||'null'); return s; } catch(e){ return null; } }

// ── Sync ──
function setSyncState(state) {
  var badge=document.getElementById('syncBadge'), text=document.getElementById('syncText');
  badge.className='sync-badge '+state;
  text.textContent = state==='ok'?'senkron' : state==='syncing'?'kaydediliyor' : 'çevrimdışı';
}

async function loadStore() {
  // Try cloud first, fall back to localStorage
  var cached = lcLoad();
  if (cached) { store = cached; setSyncState('ok'); }

  setSyncState('syncing');
  var remote = await fsGet();
  if (remote) {
    store = remote;
    if (!store.tasks) store.tasks = {daily:[],weekly:[]};
    if (!store.tasks.daily)  store.tasks.daily  = [];
    if (!store.tasks.weekly) store.tasks.weekly = [];
    lcSave();
    setSyncState('ok');
  } else {
    setSyncState(cached ? 'ok' : 'err');
  }
}

async function syncToCloud() {
  setSyncState('syncing');
  lcSave();
  await fsPatch(store);
  setSyncState('ok');
}

// ── Date helpers ──
function todayStr(){ return new Date().toISOString().slice(0,10) }
function weekOf(d){ var dt=new Date(d+'T00:00:00'), day=dt.getDay(), diff=day===0?-6:1-day; dt.setDate(dt.getDate()+diff); return dt.toISOString().slice(0,10) }
function monthOf(d){ return d.slice(0,7) }
function fmtDur(s){ s=Math.round(s); var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; if(h>0)return h+'s '+m+'d'; if(m>0)return m+'d '+sec+'sn'; return sec+'sn' }
function fmtHMS(s){ s=Math.round(s); var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return pad(h)+':'+pad(m)+':'+pad(sec) }
function pad(n){ return String(n).padStart(2,'0') }
function fmtDate(str){ var d=new Date(str+'T00:00:00'); return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'}) }

// ── Timer ──
function currentElapsed(){ return (!running||!startMs)?0:Math.floor((Date.now()-startMs)/1000) }

async function startTimer(){
  if(running)return;
  running=true; startMs=Date.now();
  store.runningStart=startMs;
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnStop').disabled=false;
  document.getElementById('timerDisplay').classList.add('running');
  document.getElementById('headerDot').classList.add('running');
  timerInterval=setInterval(tick,1000);
  await syncToCloud();
}
function tick(){ document.getElementById('timerDisplay').textContent=fmtHMS(currentElapsed()) }

async function stopTimer(){
  if(!running)return;
  clearInterval(timerInterval);
  var dur=currentElapsed(); running=false;
  store.runningStart=null;
  store.sessions.push({date:todayStr(),duration:dur,ts:Date.now()});
  startMs=null;
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('timerDisplay').textContent='00:00:00';
  document.getElementById('timerDisplay').classList.remove('running');
  document.getElementById('headerDot').classList.remove('running');
  await syncToCloud();
  renderAll();
}

// ── Stats ──
function calcStats(){
  var t=todayStr(), wk=weekOf(t), mo=monthOf(t), day=0, week=0, month=0;
  store.sessions.forEach(function(x){ if(x.date===t)day+=x.duration; if(weekOf(x.date)===wk)week+=x.duration; if(monthOf(x.date)===mo)month+=x.duration; });
  return{day:day,week:week,month:month};
}

// ── Render ──
function renderTimerTab(){
  var d=new Date();
  document.getElementById('timerDay').textContent=d.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var c=calcStats();
  document.getElementById('s-today').textContent=c.day?fmtDur(c.day):'—';
  document.getElementById('s-week').textContent=c.week?fmtDur(c.week):'—';
  document.getElementById('s-month').textContent=c.month?fmtDur(c.month):'—';
  var el=document.getElementById('recentList');
  var recent=store.sessions.slice().reverse().slice(0,6);
  if(!recent.length){el.innerHTML='<div class="empty">Henüz seans yok</div>';return}
  el.innerHTML=recent.map(function(x,i){
    var ri=store.sessions.length-1-i;
    return '<div class="session-item"><span class="session-date">'+fmtDate(x.date)+'</span><div class="session-right"><span class="session-dur">'+fmtDur(x.duration)+'</span><button class="btn-del" onclick="deleteSession('+ri+')">✕</button></div></div>';
  }).join('');
}
function renderStatsTab(){
  var today=new Date(), t=todayStr(), dow=today.getDay(), diff=dow===0?-6:1-dow;
  var weekDays=[], dn=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  for(var i=0;i<7;i++){var d2=new Date(today.getFullYear(),today.getMonth(),today.getDate()+diff+i);weekDays.push(d2.toISOString().slice(0,10))}
  document.getElementById('weekGrid').innerHTML=weekDays.map(function(d,i){
    var secs=store.sessions.filter(function(x){return x.date===d}).reduce(function(a,b){return a+b.duration},0);
    return '<div class="wday'+(d===t?' today':'')+'"><div class="wday-name">'+dn[i]+'</div><div class="wday-val">'+(secs?fmtDur(secs):'-')+'</div></div>';
  }).join('');
  var el=document.getElementById('allList');
  var all=store.sessions.slice().reverse();
  if(!all.length){el.innerHTML='<div class="empty">Henüz seans yok</div>';return}
  el.innerHTML=all.map(function(x,i){
    var ri=store.sessions.length-1-i;
    return '<div class="session-item"><span class="session-date">'+fmtDate(x.date)+'</span><div class="session-right"><span class="session-dur">'+fmtDur(x.duration)+'</span><button class="btn-del" onclick="deleteSession('+ri+')">✕</button></div></div>';
  }).join('');
}
function renderTasksTab(){
  var tasks=(store.tasks[currentPeriod]||[]), el=document.getElementById('taskList');
  if(!tasks.length){el.innerHTML='<div class="empty">Henüz görev yok</div>';return}
  el.innerHTML=tasks.map(function(t,i){
    return '<div class="task-item"><input type="checkbox" class="task-cb"'+(t.done?' checked':'')+' onchange="toggleTask('+i+')" /><span class="task-text'+(t.done?' done':'')+'">'+esc(t.text)+'</span><button class="btn-del" onclick="deleteTask('+i+')">✕</button></div>';
  }).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function renderAll(){renderTimerTab();renderStatsTab();renderTasksTab()}

// ── Task/session actions ──
async function addTask(){
  var inp=document.getElementById('taskInput'), text=inp.value.trim(); if(!text)return;
  if(!store.tasks[currentPeriod])store.tasks[currentPeriod]=[];
  store.tasks[currentPeriod].push({text:text,done:false});
  inp.value=''; renderTasksTab(); await syncToCloud();
}
async function toggleTask(i){
  store.tasks[currentPeriod][i].done=!store.tasks[currentPeriod][i].done;
  renderTasksTab(); await syncToCloud();
}
async function deleteTask(i){
  store.tasks[currentPeriod].splice(i,1); renderTasksTab(); await syncToCloud();
}
async function deleteSession(idx){
  store.sessions.splice(idx,1); renderAll(); await syncToCloud();
}

// ── Tab/period switching ──
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  document.getElementById('tab-'+name).classList.add('active');
  renderAll();
}
function switchPeriod(p,btn){
  currentPeriod=p;
  document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active'); renderTasksTab();
}

// ── Init ──
(async function(){
  await loadStore();

  if(store.runningStart){
    running=true; startMs=store.runningStart;
    document.getElementById('btnStart').disabled=true;
    document.getElementById('btnStop').disabled=false;
    document.getElementById('timerDisplay').classList.add('running');
    document.getElementById('headerDot').classList.add('running');
    timerInterval=setInterval(tick,1000); tick();
  }
  renderAll();
  document.getElementById('loadingOverlay').classList.add('hidden');

  // Background sync every 30s (for viewers)
  setInterval(async function(){
    var remote=await fsGet();
    if(remote&&!running){
      store=remote;
      if(!store.tasks)store.tasks={daily:[],weekly:[]};
      if(!store.tasks.daily)store.tasks.daily=[];
      if(!store.tasks.weekly)store.tasks.weekly=[];
      renderAll();
    }
  }, 30000);

  document.getElementById('taskInput').addEventListener('keydown',function(e){if(e.key==='Enter')addTask()});
})();
</script>
</body>
</html>
